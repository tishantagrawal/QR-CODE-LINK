<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QRift – Instant QR Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b10;
      --surface: #0e1420;
      --border: #1c2a3a;
      --neon: #00f5c4;
      --neon2: #7b61ff;
      --text: #e8f0fe;
      --muted: #5a7a9a;
      --danger: #ff4d6d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(0,245,196,0.08); top: -150px; right: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(123,97,255,0.10); bottom: -100px; left: -80px; animation-delay: -6s; }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.1); }
    }

    /* Layout */
    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, var(--neon) 0%, var(--neon2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
    }
    .logo::after {
      content: 'QRift';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--neon) 0%, var(--neon2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(20px);
      opacity: 0.4;
      z-index: -1;
    }
    .tagline {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(0,245,196,0.04), 0 20px 60px rgba(0,0,0,0.5);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      opacity: 0.6;
    }

    /* Input group */
    .input-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }
    .url-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .url-input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,245,196,0.1);
    }
    .url-input::placeholder { color: var(--muted); }

    .btn-generate {
      background: linear-gradient(135deg, var(--neon), #00c9a0);
      color: #080b10;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 0 20px rgba(0,245,196,0.3);
    }
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,245,196,0.5);
    }
    .btn-generate:active { transform: translateY(0); }

    /* Error */
    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: -18px;
      margin-bottom: 18px;
      display: none;
      letter-spacing: 1px;
    }
    .error-msg.show { display: block; }

    /* QR Output */
    .qr-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeUp 0.5s ease forwards;
    }
    .qr-section.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .qr-frame {
      position: relative;
      padding: 20px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(0,245,196,0.2), 0 0 120px rgba(123,97,255,0.1);
    }
    .qr-frame canvas, .qr-frame img { display: block; border-radius: 4px; }

    /* Corner decorations */
    .corner { position: absolute; width: 18px; height: 18px; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--neon); }
    .corner::before { width: 100%; height: 3px; }
    .corner::after  { width: 3px; height: 100%; }
    .corner.tl { top: -2px; left: -2px; }
    .corner.tr { top: -2px; right: -2px; transform: scaleX(-1); }
    .corner.bl { bottom: -2px; left: -2px; transform: scaleY(-1); }
    .corner.br { bottom: -2px; right: -2px; transform: scale(-1); }

    .qr-url {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      word-break: break-all;
      line-height: 1.6;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-action {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }
    .btn-action:hover {
      border-color: var(--neon);
      color: var(--neon);
      background: rgba(0,245,196,0.05);
    }
    .btn-action.primary {
      background: rgba(0,245,196,0.08);
      border-color: rgba(0,245,196,0.3);
      color: var(--neon);
    }
    .btn-action.primary:hover {
      background: rgba(0,245,196,0.15);
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }
    .footer span {
      color: var(--neon);
    }

    /* Pulse scan animation */
    .scan-hint {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pulse-dot {
      width: 7px; height: 7px;
      background: var(--neon);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      .input-row { flex-direction: column; }
      .btn-generate { width: 100%; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrapper">
  <header class="header">
    <div class="logo">QRift</div>
    <p class="tagline">Instant QR Code Generator</p>
  </header>

  <div class="card">
    <span class="input-label">// paste your link below</span>
    <div class="input-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://your-link.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-generate" onclick="generateQR()">Generate</button>
    </div>
    <div class="error-msg" id="errorMsg">⚠ Please enter a valid URL (must start with http:// or https://)</div>

    <div class="qr-section" id="qrSection">
      <hr class="divider" style="width:100%; margin-top:0"/>

      <div class="scan-hint">
        <div class="pulse-dot"></div>
        Ready to scan
      </div>

      <div class="qr-frame" id="qrFrame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="qrcode"></div>
      </div>

      <div class="qr-url" id="qrUrl"></div>

      <div class="actions">
        <button class="btn-action primary" onclick="downloadQR()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
        <button class="btn-action" onclick="copyLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy Link
        </button>
        <button class="btn-action" onclick="resetAll()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
          Reset
        </button>
      </div>
    </div>
  </div>

  <footer class="footer">
    Scan any QR code → opens the link automatically &nbsp;·&nbsp; Built with <span>♥</span>
  </footer>
</div>

<script>
  let currentURL = '';

  function isValidURL(str) {
    try {
      const url = new URL(str);
      return url.protocol === 'http:' || url.protocol === 'https:';
    } catch { return false; }
  }

  function generateQR() {
    const input = document.getElementById('urlInput').value.trim();
    const error = document.getElementById('errorMsg');
    const section = document.getElementById('qrSection');
    const qrContainer = document.getElementById('qrcode');
    const qrUrl = document.getElementById('qrUrl');

    // Validate
    if (!input || !isValidURL(input)) {
      error.classList.add('show');
      section.classList.remove('visible');
      return;
    }
    error.classList.remove('show');
    currentURL = input;

    // Clear previous QR
    qrContainer.innerHTML = '';

    // Generate QR
    new QRCode(qrContainer, {
      text: input,
      width: 220,
      height: 220,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    qrUrl.textContent = input;
    section.classList.remove('visible');
    void section.offsetWidth; // force reflow for animation
    section.classList.add('visible');
  }

  function downloadQR() {
    const canvas = document.querySelector('#qrcode canvas');
    if (!canvas) return;

    // Create padded version
    const size = canvas.width;
    const pad = 20;
    const out = document.createElement('canvas');
    out.width = size + pad * 2;
    out.height = size + pad * 2;
    const ctx = out.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, out.width, out.height);
    ctx.drawImage(canvas, pad, pad);

    const a = document.createElement('a');
    a.download = 'qr-code.png';
    a.href = out.toDataURL('image/png');
    a.click();
  }

  function copyLink() {
    if (!currentURL) return;
    navigator.clipboard.writeText(currentURL).then(() => {
      const btn = document.querySelectorAll('.btn-action')[1];
      const orig = btn.innerHTML;
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }

  function resetAll() {
    document.getElementById('urlInput').value = '';
    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('qrSection').classList.remove('visible');
    document.getElementById('errorMsg').classList.remove('show');
    currentURL = '';
  }

  // Allow Enter key
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateQR();
  });
</script>
</body>
</html>
